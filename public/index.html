<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <script>
    var clevertap = {
      onUserLogin: [],
      event: [],
      profile: [],
      account: [],
      onSuccess: [],
      notifications: [],
      privacy: [],
      session: [],
    };
    clevertap.account.push({ id: "88R-65Z-6K7Z" });
    clevertap.region = "eu1"; // Set your region: eu1, in1, sg1, aps3, mec1
  </script>

  <!-- Step 2: Load the SDK AFTER the init block -->
  <script src="https://cdn.jsdelivr.net/npm/clevertap-web-sdk@1.13.7/clevertap.min.js"></script>
  <body>
    <h1>Hi this is my first demo for CleverTap's SDK Web Integration</h1>

    <button id="pushNotifBtn">Click to Enable Push Notifications</button>
    <button id="storePage">Store Page</button>

    <button id="event_01">Raise test_event_01 event</button>

    <script>
      // Fire Store_Page event on button click
      window.onload = function () {
        clevertap.onUserLogin.push({
          Site: {
            Name: "Musaveer",
            Identity: "testxyz13",
          },
        });

        document
          .getElementById("storePage")
          .addEventListener("click", function () {
            clevertap.event.push("Store_Page");
          });

        document
          .getElementById("event_01")
          .addEventListener("click", function () {
            const payload = {
              d: [
                {
                  identity: "testxyz13",
                  type: "event",
                  evtName: "test_event_01",
                  evtData: {
                    date: "$D_1765354800",
                  },
                },
              ],
            };

            fetch("/send-event", {
              method: "POST",
              body: JSON.stringify(payload),
              headers: { "Content-Type": "application/json" },
            });

            console.log("test_event_01 sent via backend");
          });
      };
    </script>
  </body>
</html>
